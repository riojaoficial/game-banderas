<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 Flag Guessing Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌍 World Cup 2026 Flag Guessing Game</h1>
            <p>Guess the country from its flag! All 48 qualified nations featured.</p>
        </header>

        <div class="game-info">
            <div class="score-board">
                <div class="score-item">
                    <span class="label">Score:</span>
                    <span id="score" class="value">0</span>
                </div>
                <div class="score-item">
                    <span class="label">Questions:</span>
                    <span id="question-count" class="value">0</span>/48
                </div>
                <div class="score-item">
                    <span class="label">Accuracy:</span>
                    <span id="accuracy" class="value">0%</span>
                </div>
            </div>
        </div>

        <div class="game-container">
            <div class="flag-display">
                <div id="flag" class="flag"></div>
            </div>

            <div class="question-section">
                <h2>What country does this flag belong to?</h2>
                <div class="options" id="options"></div>
            </div>

            <div class="controls">
                <button id="skip-btn" class="btn btn-secondary">Skip</button>
                <button id="hint-btn" class="btn btn-secondary">Hint</button>
            </div>

            <div id="feedback" class="feedback hidden"></div>
        </div>

        <div class="game-end hidden" id="gameEnd">
            <h2>Game Complete! 🎉</h2>
            <div class="final-stats">
                <p><strong>Final Score:</strong> <span id="final-score">0</span>/48</p>
                <p><strong>Accuracy:</strong> <span id="final-accuracy">0%</span></p>
                <p><strong>Performance:</strong> <span id="performance">Excellent!</span></p>
            </div>
            <button id="restart-btn" class="btn btn-primary">Play Again</button>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="game.js"></script>
</body>
</html>
